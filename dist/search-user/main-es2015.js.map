export default "<div class=\"search__container\">\n  <div>\n    <h1>Procure seu perfil</h1>\n    <form class=\"form\" (submit)=\"onSubmit()\">\n      <input\n        type=\"text\"\n        placeholder=\"Username\"\n        name=\"nickname\"\n        [(ngModel)]=\"nickname\"\n        />\n      <input\n        type=\"submit\"\n        value=\"Procurar\"\n      />\n    </form>\n  </div>\n</div>"
